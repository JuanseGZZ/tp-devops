services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tp_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    # Puerto 5432 solo para desarrollo local con pgAdmin — comentar en producción
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tp_chat"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tp_chat
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
      EMAIL_RATE_LIMIT_PER_IP_PER_DAY: 3
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-1x0000000000000000000000000000000AA}
      # OpenTelemetry — vacío deshabilita el tracing. Para monitoreo local apuntar a grafana-agent:
      # OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana-agent:4318
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal

  # Grafana Agent — activo solo con: docker compose --profile monitoring up
  # Requiere variables GRAFANA_CLOUD_* en el .env raíz
  grafana-agent:
    image: grafana/agent:v0.40.0
    restart: unless-stopped
    volumes:
      - ./grafana-agent.yml:/etc/agent/config.yml
    command: ["-config.file=/etc/agent/config.yml", "-config.expand-env=true"]
    environment:
      GRAFANA_CLOUD_PROM_URL: ${GRAFANA_CLOUD_PROM_URL:-}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER:-}
      GRAFANA_CLOUD_TEMPO_ENDPOINT: ${GRAFANA_CLOUD_TEMPO_ENDPOINT:-}
      GRAFANA_CLOUD_TEMPO_USER: ${GRAFANA_CLOUD_TEMPO_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    networks:
      - internal
    depends_on:
      - backend
    profiles:
      - monitoring

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
